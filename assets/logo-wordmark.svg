<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <!-- Bauer brick mark + wordmark, 1200×400, transparent background -->
  <g transform="translate(80, 70)">
    <rect x="0"   y="0"   width="200" height="120" rx="12" fill="#1c1c2e"/>
    <rect x="220" y="0"   width="200" height="120" rx="12" fill="#1c1c2e"/>
    <rect x="0"   y="140" width="80"  height="120" rx="12" fill="#1c1c2e"/>
    <rect x="100" y="140" width="200" height="120" rx="12" fill="#d97706"/>
    <rect x="320" y="140" width="100" height="120" rx="12" fill="#1c1c2e"/>
  </g>
  <text x="560" y="200"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="200"
        fill="#1c1c2e"
        dominant-baseline="middle"
        letter-spacing="-6">Bauer</text>
</svg>
